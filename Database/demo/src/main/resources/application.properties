spring.application.name=demo

# Use the PORT environment variable provided by the host (default to 8080)
server.port=${PORT:8080}

# MySQL Connection Details - Using environment variables for production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fileapp_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Hibernate Properties (This creates the 'users' table automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
